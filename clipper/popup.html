<!doctype html>
<html lang="en" data-theme="noir">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&display=swap"
      rel="stylesheet"
    />
    <style>
      [data-theme="noir"] {
        --bg: #0b0b0c; --card: #141416; --line: rgba(255,255,255,0.08);
        --line2: rgba(255,255,255,0.18); --ink: #f6f6f3; --mut: #8b8b86; --dim: #5a5a56;
        --acc: #c6f24e; --acc-ink: #0b0b0c;
      }
      [data-theme="bone"] {
        --bg: #efece4; --card: #ffffff; --line: rgba(0,0,0,0.1); --line2: rgba(0,0,0,0.2);
        --ink: #14130f; --mut: #6f6d64; --dim: #a3a097; --acc: #4b7f00; --acc-ink: #ffffff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 9px; }
      html, body { width: 396px; }
      body {
        background: var(--bg); color: var(--ink); font-family: "Space Grotesk", system-ui, sans-serif;
        font-size: 13px; -webkit-font-smoothing: antialiased; overflow-x: hidden;
        transition: background 0.5s cubic-bezier(.22,1,.36,1), color 0.5s;
      }
      .mono { font-family: "JetBrains Mono", monospace; }
      .wrap { padding: 20px 18px 16px; }

      /* ── top ── */
      .top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 3px; }
      .word { font-family: "Unbounded", sans-serif; font-weight: 800; font-size: 27px; letter-spacing: -0.03em; line-height: 0.9; }
      .word span { display: inline-block; animation: drop 0.6s cubic-bezier(.2,1.3,.3,1) both; }
      .word span:nth-child(1){animation-delay:.02s} .word span:nth-child(2){animation-delay:.05s} .word span:nth-child(3){animation-delay:.08s}
      .word span:nth-child(4){animation-delay:.11s} .word span:nth-child(5){animation-delay:.14s} .word span:nth-child(6){animation-delay:.17s}
      @keyframes drop { from { opacity: 0; transform: translateY(-14px) rotate(-6deg); } to { opacity: 1; transform: none; } }
      .word .dot { color: var(--acc); }
      .sub { font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.34em; text-transform: uppercase; color: var(--mut); margin-top: 5px; }
      .top .sp { flex: 1; }
      .ib { width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--line); background: transparent; color: var(--mut);
        display: grid; place-items: center; cursor: pointer; font-size: 14px; transition: transform 0.24s cubic-bezier(.34,1.56,.34,1), color 0.2s, border-color 0.2s; }
      .ib:hover { color: var(--ink); border-color: var(--line2); transform: translateY(-2px); }
      .ib:active { transform: scale(0.9); }
      .cbadge { font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 12px; min-width: 32px; height: 32px; padding: 0 9px;
        display: inline-flex; align-items: center; justify-content: center; border-radius: 9px; background: var(--acc); color: var(--acc-ink); }

      .rule { height: 1px; background: var(--line); margin: 16px 0 13px; transform-origin: left; animation: grow 0.6s 0.15s cubic-bezier(.22,1,.36,1) both; }
      @keyframes grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }

      /* ── meta row ── */
      .meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
      .meta .lab { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mut); }
      .meta .conn { display: inline-flex; align-items: center; gap: 6px; font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--mut); }
      .conn .d { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); }
      .conn.ok .d { background: var(--acc); box-shadow: 0 0 0 0 var(--acc); animation: ping 2s infinite; }
      @keyframes ping { 70% { box-shadow: 0 0 0 6px transparent; } }
      .sort { margin-left: auto; display: flex; gap: 3px; }
      .sort button { font-family: "JetBrains Mono", monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim);
        background: none; border: none; cursor: pointer; padding: 4px 7px; border-radius: 7px; transition: color 0.2s, background 0.2s; }
      .sort button.on { color: var(--acc-ink); background: var(--acc); }

      /* ── list ── */
      .list { display: flex; flex-direction: column; max-height: 372px; overflow-y: auto; margin: 0 -6px; }
      .row { position: relative; padding: 13px 12px 13px 14px; border-radius: 12px; cursor: pointer; animation: rin 0.45s cubic-bezier(.22,1,.36,1) both;
        transition: background 0.2s; }
      .row::before { content: ""; position: absolute; left: 4px; top: 14px; bottom: 14px; width: 3px; border-radius: 9px; background: var(--acc); transform: scaleY(0); transform-origin: center; transition: transform 0.28s cubic-bezier(.34,1.56,.34,1); }
      .row:hover { background: var(--card); } .row:hover::before, .row.sel::before { transform: scaleY(1); }
      @keyframes rin { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
      .rhead { display: flex; align-items: baseline; gap: 12px; }
      .rco { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .rfit { margin-left: auto; font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 17px; letter-spacing: -0.03em; flex: none; }
      .rfit small { font-family: "JetBrains Mono", monospace; font-size: 8px; color: var(--dim); vertical-align: super; }
      .rrole { color: var(--mut); font-size: 12.5px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .rmeta { font-family: "JetBrains Mono", monospace; font-size: 9.5px; letter-spacing: 0.05em; color: var(--dim); margin-top: 7px; text-transform: uppercase; }
      .rmeta b { color: var(--mut); }
      /* expand */
      .redit { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(.22,1,.36,1); }
      .row.open .redit { max-height: 340px; }
      .redit .in { padding-top: 12px; display: flex; flex-direction: column; gap: 9px; }
      .fl label { display: block; font-family: "JetBrains Mono", monospace; font-size: 8.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 5px; }
      .fl input, .fl textarea { width: 100%; background: var(--bg); color: var(--ink); border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; font: inherit; font-size: 12px; outline: none; transition: border-color 0.2s; }
      .fl input:focus, .fl textarea:focus { border-color: var(--acc); }
      .fl textarea { resize: vertical; min-height: 42px; }
      .two { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
      .seg { display: flex; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; }
      .seg button { flex: 1; padding: 7px 12px; border: none; background: transparent; color: var(--mut); font: inherit; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.18s; }
      .seg button.on { background: var(--acc); color: var(--acc-ink); }
      .prio { display: flex; gap: 6px; }
      .pd { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s cubic-bezier(.34,1.56,.34,1); }
      .pd:hover { transform: scale(1.2); } .pd.on { border-color: var(--ink); }
      .racts { display: flex; gap: 7px; }
      .rb { flex: 1; padding: 8px; border-radius: 9px; border: 1px solid var(--line); background: transparent; color: var(--mut); font: inherit; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; transition: 0.18s; }
      .rb:hover { color: var(--ink); border-color: var(--line2); }
      .rb.del:hover { color: #ff5d6c; border-color: #ff5d6c66; }
      .row.out { animation: rout 0.32s cubic-bezier(.22,1,.36,1) forwards; }
      @keyframes rout { to { opacity: 0; transform: translateX(46px); max-height: 0; padding: 0; } }

      .empty { text-align: center; padding: 40px 16px; }
      .empty .g { font-family: "Fraunces", serif; font-style: italic; font-size: 26px; color: var(--ink); letter-spacing: -0.01em; }
      .empty p { font-family: "JetBrains Mono", monospace; font-size: 10.5px; color: var(--mut); margin-top: 8px; letter-spacing: 0.05em; }

      /* ── dock ── */
      .dock { display: flex; gap: 9px; margin-top: 15px; }
      .btn { flex: 1; padding: 13px; border-radius: 13px; font-family: "Space Grotesk"; font-weight: 700; font-size: 12px; letter-spacing: 0.02em; text-transform: uppercase; cursor: pointer;
        border: 1px solid var(--line2); background: transparent; color: var(--ink); position: relative; overflow: hidden; transition: transform 0.24s cubic-bezier(.34,1.56,.34,1), background 0.2s, color 0.2s, border-color 0.2s; }
      .btn:hover { transform: translateY(-2px); border-color: var(--ink); }
      .btn:active { transform: scale(0.96); }
      .btn.fill { background: var(--acc); color: var(--acc-ink); border-color: transparent; }
      .btn.fill:hover { filter: brightness(1.05); }
      .foot { font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.08em; color: var(--dim); text-align: center; margin-top: 12px; }
      .foot b { color: var(--mut); }

      /* ── command palette ── */
      .pal { position: fixed; inset: 0; z-index: 100; display: none; padding: 16px; }
      .pal.on { display: block; }
      .pal .veil { position: absolute; inset: 0; background: rgba(0,0,0,0.5); animation: vin 0.2s; }
      @keyframes vin { from { opacity: 0; } }
      .pal .sheet { position: relative; background: var(--card); border: 1px solid var(--line2); border-radius: 16px; overflow: hidden; box-shadow: 0 30px 70px -20px rgba(0,0,0,0.8); animation: sin 0.32s cubic-bezier(.34,1.56,.34,1); }
      @keyframes sin { from { opacity: 0; transform: translateY(-16px) scale(0.97); } to { opacity: 1; transform: none; } }
      .pal input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--line); color: var(--ink); font-family: "Space Grotesk"; font-size: 16px; padding: 16px 18px; outline: none; }
      .pal input::placeholder { color: var(--dim); }
      .pres { max-height: 300px; overflow-y: auto; padding: 7px; }
      .pit { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; }
      .pit .k { width: 22px; text-align: center; color: var(--mut); }
      .pit .t { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .pit .h { font-family: "JetBrains Mono", monospace; font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }
      .pit.sel { background: var(--acc); color: var(--acc-ink); } .pit.sel .k, .pit.sel .h { color: var(--acc-ink); }

      .cf { position: fixed; z-index: 200; width: 7px; height: 7px; pointer-events: none; will-change: transform, opacity; }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="word" id="word"></div>
          <div class="sub">Clip · Rank · Sync</div>
        </div>
        <div class="sp"></div>
        <span class="cbadge" id="count">0</span>
        <button class="ib" id="pal" title="Command (⌘K)">⌘</button>
        <button class="ib" id="theme" title="Theme">◐</button>
      </div>

      <div class="rule"></div>

      <div class="meta">
        <span class="lab" id="clab">Clips</span>
        <span class="conn" id="conn"><span class="d"></span><span id="connt">…</span></span>
        <div class="sort" id="sort">
          <button data-s="fit" class="on">Fit</button>
          <button data-s="new">New</button>
          <button data-s="az">A–Z</button>
        </div>
      </div>

      <div class="list" id="list"></div>

      <div class="dock">
        <button class="btn" id="clip">Clip page</button>
        <button class="btn fill" id="sync">Sync →</button>
      </div>
      <div class="foot">Clip <b>⌥⇧J</b> · Sync <b>⌥⇧S</b> · Palette <b>⌘K</b></div>
    </div>

    <div class="pal" id="palette">
      <div class="veil" data-close></div>
      <div class="sheet">
        <input id="palIn" placeholder="Search clips or run a command…" autocomplete="off" />
        <div class="pres" id="palRes"></div>
      </div>
    </div>

    <input id="file" type="file" accept=".json" hidden />
    <script src="engine.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
